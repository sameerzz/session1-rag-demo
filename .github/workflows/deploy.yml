name: CI/CD Manual VM with SHAs

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            sameerz567/session1-rag:latest
            sameerz567/session1-rag:${{ steps.vars.outputs.sha_short }}

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          FILE_SEARCH_STORE_NAME: ${{ secrets.FILE_SEARCH_STORE_NAME }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GOOGLE_API_KEY,FILE_SEARCH_STORE_NAME,LANGSMITH_API_KEY
          script: |
            mkdir -p /opt/session1-rag
            cat > /opt/session1-rag/.env <<EOF
            GOOGLE_API_KEY=${GOOGLE_API_KEY}
            FILE_SEARCH_STORE_NAME=${FILE_SEARCH_STORE_NAME}
            LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
            LANGSMITH_TRACING=true
            LANGSMITH_PROJECT=session1-rag
            EOF

            mkdir -p /opt/session1-rag-observability
            rm -rf /opt/session1-rag-observability/prometheus.yml
            cat > /opt/session1-rag-observability/prometheus.yml <<'EOF'
            global:
              scrape_interval: 5s

            scrape_configs:
              - job_name: "session1-rag-api"
                static_configs:
                  - targets:
                      # Prometheus runs in Docker, so localhost would point at the Prometheus container.
                      - "172.17.0.1:80"
            EOF

            docker pull sameerz567/session1-rag:latest
            docker stop api-server || true
            docker rm api-server || true
            docker run -d \
              --name api-server \
              -p 80:8000 \
              --env-file /opt/session1-rag/.env \
              sameerz567/session1-rag:latest

            docker rm -f prometheus || true
            docker run -d \
              --name prometheus \
              -p 9090:9090 \
              -v /opt/session1-rag-observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro \
              prom/prometheus:latest \
              --config.file=/etc/prometheus/prometheus.yml

            docker rm -f grafana || true
            docker run -d \
              --name grafana \
              -p 3000:3000 \
              -e GF_SECURITY_ADMIN_PASSWORD=admin \
              grafana/grafana:latest
